# evolution.justgui.dev — Evolution API (WhatsApp)
server {
    listen 80;
    server_name evolution.justgui.dev;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://evolution.justgui.dev$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name evolution.justgui.dev;

    ssl_certificate     /etc/letsencrypt/live/evolution.justgui.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/evolution.justgui.dev/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    resolver 127.0.0.11 valid=10s;

    location / {
        set $upstream http://comms_evolution:8080;
        proxy_pass         $upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        $connection_upgrade;
        proxy_read_timeout 86400;
    }
}
