# suporte.tyershop.com — Chatwoot
server {
    listen 80;
    server_name suporte.tyershop.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://suporte.tyershop.com$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name suporte.tyershop.com;

    ssl_certificate     /etc/letsencrypt/live/suporte.tyershop.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/suporte.tyershop.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    resolver 127.0.0.11 valid=10s;

    location / {
        set $upstream http://comms_chatwoot_tyershop:3000;
        proxy_pass         $upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 300;
    }
}
