# justgui.dev — Go API + Astro frontend
server {
    listen 80;
    server_name justgui.dev www.justgui.dev;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://justgui.dev$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name justgui.dev www.justgui.dev;

    ssl_certificate     /etc/letsencrypt/live/justgui.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/justgui.dev/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    resolver 127.0.0.11 valid=10s;

    # API Go
    location /api/ {
        set $upstream http://justgui_api:8080;
        proxy_pass         $upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Astro frontend
    location / {
        set $upstream http://justgui_web:4321;
        proxy_pass         $upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }
}
