# minio.justgui.dev — MinIO S3 API
server {
    listen 80;
    server_name minio.justgui.dev;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://minio.justgui.dev$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name minio.justgui.dev;

    ssl_certificate     /etc/letsencrypt/live/minio.justgui.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/minio.justgui.dev/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    resolver 127.0.0.11 valid=10s;

    # Permite uploads grandes
    client_max_body_size 1000M;

    location / {
        set $upstream http://storage_minio:9000;
        proxy_pass         $upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_buffering    off;
    }
}
