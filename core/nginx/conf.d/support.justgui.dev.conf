# support.justgui.dev — Chatwoot
server {
    listen 80;
    server_name support.justgui.dev;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://support.justgui.dev$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name support.justgui.dev;

    ssl_certificate     /etc/letsencrypt/live/support.justgui.dev/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/support.justgui.dev/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass         http://comms_chatwoot:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 300;
    }
}
