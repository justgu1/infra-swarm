# homolog.tyershop.com — Storefront Astro + API Node (homologação)
# Certificados: um emitido por -d no certbot-init (pastas live/homolog… e live/www…).

server {
    listen 80;
    server_name homolog.tyershop.com www.homolog.tyershop.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://homolog.tyershop.com$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name homolog.tyershop.com;

    ssl_certificate     /etc/letsencrypt/live/homolog.tyershop.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/homolog.tyershop.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    resolver 127.0.0.11 valid=10s;

    # Medusa Store + Auth (browser usa PUBLIC_MEDUSA_URL = este host)
    location /store {
        set $medusa http://tyershop_backend:9000;
        proxy_pass         $medusa;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120;
    }
    location /auth {
        set $medusa http://tyershop_backend:9000;
        proxy_pass         $medusa;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120;
    }

    location /api/ {
        set $upstream http://tyershop_api:3000;
        proxy_pass         $upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 120;
    }

    location / {
        set $upstream http://tyershop_frontend:80;
        proxy_pass         $upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 120;
    }
}

server {
    listen 443 ssl;
    server_name www.homolog.tyershop.com;

    ssl_certificate     /etc/letsencrypt/live/www.homolog.tyershop.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.homolog.tyershop.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://homolog.tyershop.com$request_uri;
}
