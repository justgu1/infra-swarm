version: '3.8'

# Stack: storage
# Serviços: MinIO (S3-compatible object storage)
# Buckets por projeto: hericarealtor, support, justgui
# Deploy: docker stack deploy -c stacks/storage.yml storage

services:
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_BROWSER_REDIRECT_URL}
    volumes:
      - minio_data:/data
    networks:
      - proxy
      - internal
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 5s

  # Cria os buckets iniciais automaticamente
  minio_init:
    image: minio/mc:latest
    depends_on:
      - minio
    networks:
      - internal
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    entrypoint: >
      /bin/sh -c "
        sleep 10;
        mc alias set local http://storage_minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD};
        mc mb --ignore-existing local/hericarealtor;
        mc mb --ignore-existing local/support;
        mc mb --ignore-existing local/justgui;
        echo 'Buckets criados.';
        exit 0;
      "
    deploy:
      restart_policy:
        condition: none

volumes:
  minio_data:

networks:
  proxy:
    external: true
  internal:
    external: true
