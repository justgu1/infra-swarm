version: '3.8'

# Stack: core
# Serviços: Nginx (reverse proxy) + Certbot (renovação automática SSL)
# Deploy: docker stack deploy -c stacks/core.yml core

services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: host
      - target: 443
        published: 443
        protocol: tcp
        mode: host
    volumes:
      - ${DEPLOY_PATH}/core/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ${DEPLOY_PATH}/core/nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    networks:
      - proxy
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
        delay: 5s

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    # Renova certs a cada 12h
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done"
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure

volumes:
  certbot_certs:
    external: true
  certbot_www:
    external: true

networks:
  proxy:
    external: true
