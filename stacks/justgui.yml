version: '3.8'

# Stack: justgui
# Serviços: Go API + Astro frontend
# Imagens: ghcr.io/justgu1/justgui-api:latest, ghcr.io/justgu1/justgui-web:latest
# Deploy: docker stack deploy -c stacks/justgui.yml justgui

services:
  api:
    image: ghcr.io/justgu1/justgui-api:${JUSTGUI_TAG:-latest}
    environment:
      PORT: 8080
      ENV: production
      TZ: America/Sao_Paulo
    networks:
      - proxy
      - internal
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s

  web:
    image: ghcr.io/justgu1/justgui-web:${JUSTGUI_TAG:-latest}
    environment:
      PORT: 4321
      PUBLIC_API_URL: ${URL_JUSTGUI}/api
      TZ: America/Sao_Paulo
    networks:
      - proxy
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        delay: 5s

networks:
  proxy:
    external: true
  internal:
    external: true
